# Gripper servo motor control for STM32F411 Black Pill
# Based on zephyr/samples/basic/servo_motor with overlay from joint_microros_tmc2209_gripper

CONFIG_GPIO=y

CONFIG_PWM=y
CONFIG_PWM_STM32=y
#CONFIG_PWM_SERVO=y

# USB CDC ACM configuration (console via USB)
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="STM32 CDC"
CONFIG_USB_DEVICE_VID=0x0483
CONFIG_USB_DEVICE_PID=0x5740
CONFIG_USB_CDC_ACM=y
CONFIG_USB_CDC_ACM_RINGBUF_SIZE=256

# Console
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_STDOUT_CONSOLE=y

# Auto-initialize USB at boot
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
