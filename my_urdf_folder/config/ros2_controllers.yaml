controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ebamk2_controller:
      type: joint_trajectory_controller/JointTrajectoryController

ebamk2_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_6
      # Add joint_6 if you want the gripper controlled via trajectory (optional)

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    # === IMPORTANT: Use .0 for these rates ===
    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: true
    allow_integration_in_goal_trajectories: false

    # Optional: constraints (helps with stopping)
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
