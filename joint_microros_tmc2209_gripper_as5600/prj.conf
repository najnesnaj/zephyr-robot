# Zephyr config for triple TMC2209 stepper drivers, gripper servo,
# three AS5600 magnetic encoders, and micro-ROS over USB CDC

CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_I2C_STM32=y

CONFIG_SENSOR=y
CONFIG_AMS_AS5600=y

CONFIG_MICROROS=y
CONFIG_MICROROS_TRANSPORT_SERIAL_USB=y
CONFIG_CPP=y

CONFIG_MAIN_STACK_SIZE=25000
CONFIG_MAIN_THREAD_PRIORITY=3

CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=n
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_DEFERRED=y

CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

CONFIG_POSIX_API=y
CONFIG_POSIX_TIMERS=y
CONFIG_POSIX_CLOCK_SELECTION=y
CONFIG_POSIX_MONOTONIC_CLOCK=y

CONFIG_HEAP_MEM_POOL_SIZE=16384

CONFIG_STEPPER=y
CONFIG_STEPPER_ADI_TMC2209=y
CONFIG_COUNTER=y

CONFIG_PWM=y
CONFIG_PWM_STM32=y

# USB CDC ACM configuration
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="STM32 CDC"
CONFIG_USB_DEVICE_VID=0x0483
CONFIG_USB_DEVICE_PID=0x5740
CONFIG_USB_CDC_ACM=y
CONFIG_USB_CDC_ACM_RINGBUF_SIZE=256

# Console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_STDOUT_CONSOLE=y
